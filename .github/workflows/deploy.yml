name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

  deploy-lambda:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package and deploy BTS Lambda
        run: |
          cd lambda/bts_downloader
          pip install -r requirements.txt -t .
          zip -r bts_downloader.zip .
          aws lambda update-function-code \
            --function-name flight-pipeline-bts-downloader \
            --zip-file fileb://bts_downloader.zip \
            --region ${{ secrets.AWS_REGION }}

      - name: Package and deploy NOAA Lambda
        run: |
          cd lambda/noaa_fetcher
          pip install -r requirements.txt -t .
          zip -r noaa_fetcher.zip .
          aws lambda update-function-code \
            --function-name flight-pipeline-noaa-fetcher \
            --zip-file fileb://noaa_fetcher.zip \
            --region ${{ secrets.AWS_REGION }}